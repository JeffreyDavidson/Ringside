name: CI Pipeline

on:
  push:
    branches:
      - '*'         # matches every branch that doesn't contain a '/'
      - '*/*'       # matches every branch containing a single '/'
      - '**'        # matches every branch
      - '!master'

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        php: [8.4]
    name: CI - PHP-${{ matrix.php }}
    env:
      extensionKey: phpextensions-${{ matrix.os }}-P${{ matrix.php }}
      extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo, :psr

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.extensions }}
          key: ${{ env.extensionKey }}

      - name: Cache extensions
        uses: actions/cache@v4
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ matrix.os }}-${{ steps.extcache.outputs.key }}
          restore-keys: ${{ matrix.os }}-${{ steps.extcache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.extensions }}
          tools: phpunit:latest
          ini-values: memory_limit=512M
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup problem matchers for PHP
        run: echo "::add-matcher::${{ runner.tool_cache }}/php.json"

      - name: Get composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ matrix.os }}-PHP${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ matrix.os }}-PHP${{ matrix.php }}-composer-

      - name: Add token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer config github-oauth.github.com $GITHUB_TOKEN

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup Laravel application
        run: |
          cp .env.testing .env
          php artisan key:generate
          php artisan config:cache

      - name: Setup problem matchers for PHPUnit
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Run Feature Tests
        run: php ./vendor/bin/pest --ci --testsuite "Feature" --no-coverage --parallel

      - name: Run Integration Tests
        run: php ./vendor/bin/pest --ci --testsuite "Integration" --no-coverage --parallel

      - name: Run Unit Tests
        run: php ./vendor/bin/pest --ci --testsuite "Unit" --no-coverage --parallel

      - name: Cache PHPStan results
        uses: actions/cache@v4
        with:
          path: ./build/phpstan
          key: phpstan-${{ matrix.os }}-P${{ matrix.php }}-L${{ matrix.laravel }}

      - name: Run PHPStan Static Analysis
        run: composer test:types